<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creditopia Design Preview</title>
    <style>
      :root {
        --bg: #05070a;
        --bg-deep: #0a1220;
        --line: rgba(136, 182, 255, 0.18);
        --text: #eef6ff;
        --muted: #98acc7;
        --accent: #4ef0da;
        --accent-secondary: #8d6bff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 18%, rgba(78, 240, 218, 0.18), transparent 22%),
          radial-gradient(circle at 84% 16%, rgba(141, 107, 255, 0.18), transparent 18%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      }

      .preview-shell {
        width: min(720px, 100%);
        padding: 32px;
        border-radius: 28px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(14, 26, 44, 0.78), rgba(8, 15, 26, 0.9)),
          linear-gradient(135deg, rgba(78, 240, 218, 0.08), transparent 46%);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), 0 0 30px rgba(78, 240, 218, 0.08);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        display: inline-flex;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(78, 240, 218, 0.2);
        background: rgba(78, 240, 218, 0.08);
        color: #d8fdf7;
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0;
        max-width: 44ch;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .primary {
        color: #061018;
        background: linear-gradient(135deg, #7ff4e6, #39d8e3 54%, #7d8dff);
        box-shadow: 0 18px 36px rgba(18, 184, 199, 0.22);
      }

      .secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(136, 182, 255, 0.16);
      }

      .primary:hover,
      .secondary:hover {
        transform: translateY(-2px);
      }

      .status {
        margin-top: 24px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(136, 182, 255, 0.12);
        color: #bcd0e7;
      }

      code {
        color: #9df8ee;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <div class="eyebrow">Creditopia Preview</div>
      <h1>载入演示数据并查看最新设计</h1>
      <p>
        这个页面会把一组示例信用卡数据写入当前浏览器的本地存储，然后跳转到最新首页，方便你直接看到科技感升级后的完整界面。
      </p>

      <div class="actions">
        <button class="primary" id="launch-preview">打开设计预览</button>
        <a class="secondary" href="./index.html">直接打开首页</a>
      </div>

      <div class="status" id="status">
        预览入口文件：<code>design-preview.html</code>
      </div>
    </main>

    <script>
      const STORAGE_KEY = 'creditopia-credit-cards';
      const LEDGER_STORAGE_KEY = 'creditopia-ledger-total-debt';
      const status = document.querySelector('#status');
      const launchButton = document.querySelector('#launch-preview');

      const demoCards = [
        {
          id: 'demo-cmb-8891',
          bank: 'cmb',
          name: '招商银行 Young 卡',
          last4: '8891',
          limit: 68000,
          available: 23140,
          updatedAt: '2026-04-23T09:42:00+08:00',
        },
        {
          id: 'demo-citic-3208',
          bank: 'citic',
          name: '中信银行 AI 白金卡',
          last4: '3208',
          limit: 50000,
          available: 17300,
          updatedAt: '2026-04-23T09:46:00+08:00',
        },
        {
          id: 'demo-pingan-4416',
          bank: 'pingan',
          name: '平安银行 车主卡',
          last4: '4416',
          limit: 36000,
          available: 12740,
          updatedAt: '2026-04-23T09:51:00+08:00',
        },
        {
          id: 'demo-icbc-1072',
          bank: 'icbc',
          name: '工商银行 数字卡',
          last4: '1072',
          limit: 92000,
          available: 44880,
          updatedAt: '2026-04-23T09:58:00+08:00',
        },
      ];

      function loadPreview() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(demoCards));
        localStorage.setItem(LEDGER_STORAGE_KEY, '145280');
        status.textContent = '演示数据已写入，正在跳转到最新首页...';
        window.location.href = './index.html?preview=1';
      }

      launchButton.addEventListener('click', loadPreview);

      window.setTimeout(loadPreview, 260);
    </script>
  </body>
</html>
